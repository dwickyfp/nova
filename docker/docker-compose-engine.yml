# ═══════════════════════════════════════════════════════════════════
# Nova Engine — Docker Compose
# StarRocks 4.1.1 + MinIO + Redis (infrastructure only)
# ═══════════════════════════════════════════════════════════════════
#
# Services:
#   - minio:          S3-compatible object storage (port 9000/9001)
#   - minio-init:     Auto-creates buckets + service account
#   - redis:          Session store + cache (port 6379)
#   - starrocks-fe:   StarRocks Frontend (port 8030 HTTP, 9030 MySQL)
#   - starrocks-be:   StarRocks Backend (port 8040 HTTP)
#   - starrocks-init: Auto-creates NOVA_SYSTEM + admin + ACCOUNTADMIN
#
# Quick Start:
#   cp .env.example .env
#   docker compose -f docker-compose-engine.yml up -d
#
# Access:
#   StarRocks FE:    http://localhost:8030
#   StarRocks BE:    http://localhost:8040
#   MinIO Console:   http://localhost:9001  (minioadmin/minioadmin)
#   MinIO API:       http://localhost:9000
#   MySQL:           mysql -h localhost -P 9030 -u nova_admin -p
#   Redis:           redis-cli -h localhost -p 6379 -a novaredis
#
# Auth Model:
#   root       → empty password, Docker internal only (NOT exposed externally)
#   nova_admin → default 'nova', forces password change on first login
#   All login users ARE StarRocks users (no separate user table)
#
# NOVA_SYSTEM tables are grouped by prefixes because StarRocks namespaces
# objects as catalog.database.table and does not provide nested schemas:
#   CONFIG_*, ML_*, AUDIT_*, STAGE_*, LINEAGE_*, QUALITY_*, USAGE_*
# ═══════════════════════════════════════════════════════════════════

name: docker

services:

  # ── MinIO (S3-compatible object storage) ──────────────────────────
  minio:
    image: minio/minio:latest
    container_name: nova-minio
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      TZ: ${TZ:-Asia/Jakarta}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      # Override ALL built-in _FILE env vars from MinIO image
      # Use space character to effectively blank them (empty string removes the var)
      MINIO_ROOT_USER_FILE: " "
      MINIO_ROOT_PASSWORD_FILE: " "
      MINIO_ACCESS_KEY_FILE: " "
      MINIO_SECRET_KEY_FILE: " "
      MINIO_KMS_SECRET_KEY_FILE: " "
    volumes:
      - minio_data:/data
      - /usr/share/zoneinfo/Asia/Jakarta:/usr/share/zoneinfo/Asia/Jakarta:ro
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - nova

  # ── MinIO Init (auto-create buckets + service account) ────────────
  minio-init:
    image: minio/mc:latest
    container_name: nova-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set nova http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};

      mc mb --ignore-existing nova/stages;
      mc mb --ignore-existing nova/exports;
      mc mb --ignore-existing nova/temp;

      mc admin user add nova $${MINIO_ACCESS_KEY} $${MINIO_SECRET_KEY};
      mc admin policy attach nova readwrite --user $${MINIO_ACCESS_KEY};

      echo 'MinIO init complete!';
      "
    environment:
      TZ: ${TZ:-Asia/Jakarta}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-nova}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-novasecret}
    volumes:
      - /usr/share/zoneinfo/Asia/Jakarta:/usr/share/zoneinfo/Asia/Jakarta:ro
    networks:
      - nova

  # ── Redis (session store + cache) ─────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nova-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    environment:
      TZ: ${TZ:-Asia/Jakarta}
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-novaredis}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-novaredis}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - nova

  # ── StarRocks FE (Frontend — query, metadata, auth) ──────────────
  starrocks-fe:
    image: starrocks/fe-ubuntu:4.1.1
    container_name: nova-starrocks-fe
    hostname: starrocks-fe
    ports:
      - "8030:8030"   # HTTP API
      - "9020:9020"   # FE edit log port
      - "9030:9030"   # MySQL protocol (for backend dev)
    environment:
      TZ: ${TZ:-Asia/Jakarta}
      HOST_TYPE: FQDN
      ENV_TYPE: docker_compose_deploy
      ENABLE_DEBUG_SOCKET: "false"
      JAVA_OPTS: "-Xmx4g -XX:+UseG1GC -XX:MaxGCPauseMillis=200"
    ulimits:
      nproc:
        soft: 65535
        hard: 65535
      nofile:
        soft: 655350
        hard: 655350
    volumes:
      - fe_meta:/opt/starrocks/fe/meta
      - fe_log:/opt/starrocks/fe/log
      - ./fe.conf:/opt/starrocks/fe/conf/fe.conf:ro
    entrypoint: ["/bin/bash", "-c"]
    command: ["/opt/starrocks/fe_entrypoint.sh starrocks-fe && tail -F /opt/starrocks/fe/log/fe.log"]
    healthcheck:
      test: ["CMD", "mysql", "-h", "127.0.0.1", "-P", "9030", "-u", "root", "-e", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    networks:
      - nova

  # ── StarRocks BE (Backend — storage, compute) ────────────────────
  starrocks-be:
    image: starrocks/be-ubuntu:4.1.1
    container_name: nova-starrocks-be
    hostname: starrocks-be
    depends_on:
      starrocks-fe:
        condition: service_healthy
    ports:
      - "8040:8040"   # HTTP API
      - "9050:9050"   # Heartbeat port
    environment:
      TZ: ${TZ:-Asia/Jakarta}
      HOST_TYPE: FQDN
      ENV_TYPE: docker_compose_deploy
      ENABLE_DEBUG_SOCKET: "false"
    ulimits:
      nproc:
        soft: 65535
        hard: 65535
      nofile:
        soft: 655350
        hard: 655350
    volumes:
      - be_storage:/opt/starrocks/be/storage
      - be_log:/opt/starrocks/be/log
      - ./be.conf:/opt/starrocks/be/conf/be.conf:ro
    entrypoint: ["/bin/bash", "-c"]
    command: ["/opt/starrocks/be_entrypoint.sh starrocks-fe && tail -F /opt/starrocks/be/log/be.log"]
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost:8040/api/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    networks:
      - nova

  # ── StarRocks Init (auto-create NOVA_SYSTEM + admin) ─────────────
  starrocks-init:
    image: mysql:8.0
    container_name: nova-starrocks-init
    depends_on:
      starrocks-fe:
        condition: service_healthy
      starrocks-be:
        condition: service_healthy
    entrypoint: ["/bin/bash", "/init-entrypoint.sh"]
    environment:
      TZ: ${TZ:-Asia/Jakarta}
    volumes:
      - ./init-entrypoint.sh:/init-entrypoint.sh:ro
      - ./init-nova.sql:/docker-entrypoint-initdb.d/init-nova.sql:ro
    networks:
      - nova

networks:
  nova:

volumes:
  fe_meta:
    name: docker_fe_meta
  fe_log:
    name: docker_fe_log
  be_storage:
    name: docker_be_storage
  be_log:
    name: docker_be_log
  minio_data:
    name: docker_minio_data
  redis_data:
    name: docker_redis_data
