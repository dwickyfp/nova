# ═══════════════════════════════════════
# StarRocks FE Configuration
# Nova Engine — All features enabled
# ═══════════════════════════════════════

# ── Cluster ──
# Use FQDN for container networking. Do not set priority_networks here:
# Docker/OrbStack subnets are dynamic, and StarRocks uses that setting as a
# hard address filter even in FQDN mode.
enable_fqdn_mode = true

# ── Ports ──
http_port = 8030
rpc_port = 9020
query_port = 9030
edit_log_port = 9040

# ── Storage ──
meta_dir = /opt/starrocks/fe/meta
enable_load_volume_from_conf = true

# ── Query Engine ──
enable_pipeline_engine = true
enable_pipeline_level_shuffle = true
enable_spill = true
spill_mode = auto

# ── Materialized Views ──
enable_materialized_view = true
enable_materialized_view_spill = true
enable_materialized_view_rewrite = true
enable_materialized_view_text_based_rewrite = true

# ── Statistics ──
enable_statistic_collect = true
enable_auto_collect_statistics = true
auto_collect_statistics_interval = 3600
statistic_auto_collect_ratio = 0.8

# ── Query Queue ──
enable_query_queue_v2 = true

# ── Audit ──
enable_audit_sql = true

# ── Schema Evolution ──
fast_schema_evolution = true

# ── CDC ──
binlog_enable = true

# ── Replication ──
default_replication_num = 1

# ── Buckets ──
default_bucket_num = 48

# ── Connections ──
qe_max_connection = 4096

# ── Auth ──
enable_auth_check = true

# ── UDF ──
enable_udf = true

# ── AI/ML ──
llm_max_queue_size = 128
llm_max_concurrent_queries = 64
llm_cache_size = 256

# ── External Catalogs ──
# enable_hive_metastore_service = true
# enable_iceberg_rest_catalog = true

# ── Logging ──
# log_roll_num = 30
# sys_log_dir = /opt/starrocks/fe/log
# audit_log_dir = /opt/starrocks/fe/log
