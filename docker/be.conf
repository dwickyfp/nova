# ═══════════════════════════════════════
# StarRocks BE Configuration
# Nova Engine
# ═══════════════════════════════════════

# ── Cluster ──
# FQDN mode is selected by the container entrypoint. Keep priority_networks
# unset because Docker/OrbStack assigns the service subnet dynamically.

# ── Ports ──
be_port = 9060
webserver_port = 8040
heartbeat_service_port = 9050
brpc_port = 8060

# ── Storage ──
storage_root_path = /opt/starrocks/be/storage

# ── Memory ──
mem_limit = 80%

# ── Spill ──
enable_spill = true

# ── Logging ──
sys_log_dir = /opt/starrocks/be/log
