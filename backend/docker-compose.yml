services:
  starrocks-fe:
    image: starrocks/fe-ubuntu:4.1.1
    container_name: nova-sr-fe
    ports:
      - "9030:9030"    # MySQL protocol
      - "8030:8030"    # HTTP (web UI)
      - "9010:9010"    # FE internal
    environment:
      - FE_QUERY_PORT=9030
    volumes:
      - sr-fe-meta:/opt/starrocks/fe/meta
    healthcheck:
      test: ["CMD", "mysql", "-h", "127.0.0.1", "-P", "9030", "-u", "root", "-e", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks:
      - nova

  starrocks-be:
    image: starrocks/be-ubuntu:4.1.1
    container_name: nova-sr-be
    depends_on:
      starrocks-fe:
        condition: service_healthy
    environment:
      - FE_ADDRESS=starrocks-fe:9010
    volumes:
      - sr-be-storage:/opt/starrocks/be/storage
    networks:
      - nova

  minio:
    image: minio/minio:latest
    container_name: nova-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"    # S3 API
      - "9001:9001"    # Web console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - nova

  redis:
    image: redis:7-alpine
    container_name: nova-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 10
    networks:
      - nova

volumes:
  sr-fe-meta:
  sr-be-storage:
  minio-data:
  redis-data:

networks:
  nova:
    driver: bridge
